# GitHub Actions CI workflow for repository governance and KB validation.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-runtime-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-bash
            os: ubuntu-latest
            shell: bash
          - name: linux-pwsh
            os: ubuntu-latest
            shell: pwsh
          - name: windows-pwsh
            os: windows-latest
            shell: pwsh
    name: validate-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unified workspace validation (bash)
        if: matrix.shell == 'bash'
        shell: bash
        run: python scripts/validate-workspace.py --check ci-core

      - name: Run unified workspace validation (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: python scripts/validate-workspace.py --check ci-core

      - name: Run validator tests with coverage (bash)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          pytest tests/ -v \
            --junitxml=test-results.xml \
            --cov=scripts \
            --cov-config=.coveragerc \
            --cov-fail-under=80 \
            --cov-report=term-missing

      - name: Run validator tests with coverage (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: pytest tests/ -v --junitxml=test-results.xml --cov=scripts --cov-config=.coveragerc --cov-fail-under=80 --cov-report=term-missing

      - name: Upload test results artifact
        if: always() && matrix.name == 'linux-bash'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 30

  notify-failure:
    name: Notify on CI failure
    runs-on: ubuntu-latest
    needs: [validate-runtime-matrix]
    if: failure()
    steps:
      - name: Notify Teams — CI failure
        env:
          # TEAMS_WEBHOOK_URL is intentionally empty for fork-triggered runs (secrets are not passed to
          # untrusted forks). The `if [ -n "$TEAMS_WEBHOOK_URL" ]` guard below makes this safe.
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$TEAMS_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n \
              --arg workflow "$WORKFLOW" \
              --arg branch   "$BRANCH" \
              --arg actor    "$ACTOR" \
              --arg url      "$RUN_URL" \
              '{
                "@type": "MessageCard",
                "summary": "CI failed",
                "themeColor": "FF0000",
                "sections": [{
                  "activityTitle": "CI failed",
                  "activityText": ("Workflow: " + $workflow + " | Branch: " + $branch + " | By: " + $actor + " | " + $url)
                }]
              }')
            curl -s -X POST "$TEAMS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || true
          fi
