# GitHub Actions CI Workflow for Node.js/TypeScript Project

# This workflow triggers on push to main and pull request events.
# It includes multi-stage jobs: prepare, build, test, lint.
# Security scanning is handled by the dedicated security-scan.yml workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TYPESCRIPT_VERSION: '5.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build project
        run: npm run build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Lint code
        run: npx eslint src --ext js,ts
