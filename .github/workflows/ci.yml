# GitHub Actions CI workflow for repository governance and KB validation.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-runtime-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-bash
            os: ubuntu-latest
            shell: bash
          - name: linux-pwsh
            os: ubuntu-latest
            shell: pwsh
          - name: windows-pwsh
            os: windows-latest
            shell: pwsh
    name: validate-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unified workspace validation (bash)
        if: matrix.shell == 'bash'
        shell: bash
        run: python scripts/validate-workspace.py --check ci-core
      - name: Run unified workspace validation (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: python scripts/validate-workspace.py --check ci-core
      - name: Run validator regression tests (bash)
        if: matrix.shell == 'bash'
        shell: bash
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Run validator regression tests (pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: python -m unittest discover -s tests -p "test_*.py"
