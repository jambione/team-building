# GitHub Actions CI Workflow for Node.js/TypeScript Project

# This workflow triggers on push to main and pull request events.
# It includes multi-stage jobs: prepare, build, test, lint, security scan.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  TYPESCRIPT_VERSION: '5.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Cache dependencies
        run: |
          mkdir -p $HOME/.cache/node-gyp
          npm install --legacy-peer-deps
          echo "Cache installed"
  build:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
  test:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
  lint:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Install dependencies
        run: npm install
      - name: Lint code
        run: npx eslint src --ext js,ts
  security-scan:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Install dependencies
        run: npm install
      - name: Run security scan
        run: npx trivy --severity HIGH,CRITICAL .
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'actions/cache'
      - name: Install dependencies
        run: npm install
      - name: Deploy to staging
        run: | 
          echo "Deploying to staging..."
          # Add deployment logic here
          # This is a placeholder for actual deployment steps
