# Staging Deployment Workflow
#
# Publishes the team-building knowledge base and agent framework as a
# versioned GitHub Pages site (staging environment). This makes the KB
# navigable as a static site for the team without requiring repo access.
#
# Pattern notes (for spoke repo adaptation):
#   - Health-check polling loop after deploy — do not skip.
#   - Rollback job runs on failure using fetch-depth: 0 to access parent commit.
#   - Environment gate ("staging") enforces required reviewers when configured
#     in GitHub Settings → Environments.
#   - See knowledge_base/documents/github-actions-security-hardening.md for
#     the full permissions model and compliance requirements.
#
# Triggers:
#   - Push to main (auto-deploy on merge)
#   - Manual dispatch (on-demand staging publish)
#
# Owner: geordi | Security review: worf | Reliability: crusher

name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy (logged in deployment record)'
        required: false
        default: 'manual trigger'

permissions:
  contents: read
  actions: read
  deployments: write   # required to create GitHub deployment records
  pages: write         # required for GitHub Pages publish
  id-token: write      # required for OIDC-based Pages deploy

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy — let it complete or fail cleanly

env:
  DEPLOY_ENV: staging

jobs:
  deploy:
    name: Publish to GitHub Pages (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository (full history for rollback)
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required — any rollback job using git rev-parse HEAD^1
          # needs the full commit graph. Shallow clones will fail at the worst moment.
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site from knowledge base
        run: |
          mkdir -p _site
          # Copy docs and knowledge_base as the static site content.
          # Adapt this step for your deployment target (rsync, Docker push, etc.)
          cp -r docs/. _site/
          cp -r knowledge_base/. _site/knowledge_base/
          cp README.md _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Health check — verify deployment is reachable
        env:
          PAGE_URL: ${{ steps.deploy.outputs.page_url }}
        run: |
          echo "Checking deployment health at: $PAGE_URL"
          MAX_ATTEMPTS=6
          ATTEMPT=0
          until curl -sf --max-time 10 "$PAGE_URL" > /dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Health check failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — waiting 10s..."
            sleep 10
          done
          echo "Deployment healthy."

      - name: Emit deployment telemetry
        if: always()
        env:
          OUTCOME: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Structured deployment event — satisfies monitoring-observability.md
          # Deployment Telemetry Prerequisite (added 2026-04-12).
          echo "DEPLOY_EVENT: environment=staging commit_sha=$COMMIT_SHA deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ) outcome=$OUTCOME"

  rollback:
    name: Rollback on deploy failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: failure()

    steps:
      - name: Checkout repository (full history required for rollback)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Identify previous stable commit
        id: prev
        run: |
          PREV=$(git rev-parse HEAD^1)
          echo "Rolling back to: $PREV"
          echo "sha=$PREV" >> "$GITHUB_OUTPUT"

      - name: Emit rollback telemetry
        run: |
          echo "ROLLBACK_EVENT: environment=staging failed_sha=${{ github.sha }} rollback_target=${{ steps.prev.outputs.sha }} initiated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Notify rollback (Teams webhook — fire-and-forget)
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          FAILED_SHA: ${{ github.sha }}
          ROLLBACK_SHA: ${{ steps.prev.outputs.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$TEAMS_WEBHOOK_URL" ]; then
            PAYLOAD=$(jq -n \
              --arg failed  "$FAILED_SHA" \
              --arg target  "$ROLLBACK_SHA" \
              --arg actor   "$ACTOR" \
              '{
                "@type": "MessageCard",
                "summary": "Staging rollback triggered",
                "themeColor": "FF0000",
                "sections": [{
                  "activityTitle": "⚠️ Staging deploy failed — rollback initiated",
                  "activityText": ("Failed SHA: " + $failed + " | Rollback target: " + $target + " | Triggered by: " + $actor)
                }]
              }')
            curl -s -X POST "$TEAMS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || true
          fi
