name: Agent Structure Check

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/workflows/**"
      - "docs/reference/TEAM-TOPOLOGY.md"
      - "docs/reference/STATUS.md"
      - "scripts/validate-agent-structure.py"
      - "scripts/validate-workspace.py"
  push:
    branches: [main]
    paths:
      - ".github/agents/**"
      - ".github/workflows/**"
      - "docs/reference/TEAM-TOPOLOGY.md"
      - "docs/reference/STATUS.md"
      - "scripts/validate-agent-structure.py"
      - "scripts/validate-workspace.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unified workspace validation (agent structure)
        run: python scripts/validate-workspace.py --check agent-structure
