name: KB Quality Check

on:
  pull_request:
    paths:
      - "knowledge_base/**"
      - "scripts/kb-lint.py"
      - "scripts/validate-discovery-kb-link.py"
      - ".github/workflows/kb-quality-check.yml"
  push:
    branches: [main]
    paths:
      - "knowledge_base/**"
      - "scripts/kb-lint.py"
      - "scripts/validate-discovery-kb-link.py"
      - ".github/workflows/kb-quality-check.yml"

permissions:
  contents: read

jobs:
  lint-kb:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run KB lint
        run: python scripts/kb-lint.py

      - name: Validate discovery-to-KB linkage
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: python scripts/validate-discovery-kb-link.py
