# Dependabot configuration
#
# Automatically opens PRs when pinned GitHub Actions versions receive updates.
# This ensures action security patches are not missed silently.
#
# Owner: geordi | Reviewed by: worf
# Closes: TD-003 (No Dependabot configuration — dependency updates fully manual)

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "jambione"
